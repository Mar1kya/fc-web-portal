image: node:20-alpine

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - type-check
  - build
  - mirror

cache:
  key:
    files:
      - package-lock.json
    prefix: v2
  paths:
    - .npm/

lint_job:
  stage: lint
  script:
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    - npx prisma generate
    - npm run lint

typecheck_job:
  stage: type-check
  script:
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    - npx prisma generate
    - npm run type-check

build_job:
  stage: build
  script:
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    - npx prisma generate
    - npm run build

mirror_to_github:
  stage: mirror
  image: alpine/git
  rules:
    - if: $CI_COMMIT_BRANCH == "main" 
  script:
    - git config --global user.email "marian0412510301@gmail.com"
    - git config --global user.name "Mar1kya"
    - git push "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git" HEAD:refs/heads/main --force